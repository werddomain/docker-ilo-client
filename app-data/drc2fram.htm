function writeTable( Tbl, nFields ) {		 // This function writes multiple fields in a table
	// Generate each row
	for ( i in Tbl ) {
		document.write("<TR>");
		for ( j = 0; j < nFields; j++ ) {
			// Generate each column
			document.write("<TD valign='top'>"+Tbl[i][j]+"</TD>");
		}
		document.write("</TR>");
	}
}

function writeOut( outString ) {
	document.write( outString );
}

function euroDate( dateString ) {
	// Convert a mm/dd/yyyy date to a dd/mm/yyyy format
	// Note: months and days must be 2 digits, year must be 4 digits
	var month, day, year;
	month = dateString[ 0 ] + dateString[ 1 ];
	day   = dateString[ 3 ] + dateString[ 4 ];
	year  = dateString[ 6 ] + dateString[ 7 ] + dateString[ 8 ] + dateString[ 9 ];
	return day + "/" + month + "/" + year;
}

function viewOnly( thisForm )
{
	var eachInput;

	for ( eachInput = 0; eachInput < thisForm.elements.length; eachInput++ )
	{
		thisForm.elements[ eachInput ].disabled = true;
	}
}	

function handleError(desc, fileName, lineNum)
{
	msg = "Integrated Lights-Out has detected an error:\n\n"
	msg += "Error Message: " + desc + "\n"
	msg += "File Name: " + fileName + "\n"
	msg += "Line Number: " + lineNum + "\n"
	alert (msg)
	return true;
}
